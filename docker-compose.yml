services:
  db:
    image: postgres:16-alpine
    container_name: contacts_db
    environment:
      POSTGRES_DB: contacts_db
      POSTGRES_USER: contacts_user
      POSTGRES_PASSWORD: contacts_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contacts_user -d contacts_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contacts_api
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=contacts_db;Username=contacts_user;Password=contacts_pass"
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000
    container_name: contacts_frontend
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
